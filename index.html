<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carrito de Compras</title>
</head>
<body>

<h2>Carrito</h2>

<input id="producto" placeholder="Producto">
<input id="precio" type="number" placeholder="Precio">
<input id="cantidad" type="number" placeholder="Cantidad">
<button onclick="agregar()">Agregar</button>

<ul id="lista"></ul>

<h3>Total: $<span id="total">0</span></h3>

<script>
let total = 0;

function agregar() {
  let p = producto.value;
  let pr = parseFloat(precio.value);
  let c = parseInt(cantidad.value);

  let sub = pr * c;
  total += sub;

  lista.innerHTML += `<li>${p} - $${sub}</li>`;
  total.innerText = total;
}
</script>

</body>
</html>
